<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new account on EstateLink Pro.">
    <meta name="theme-color" content="#0056b3">
    <title>Register | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--light);">
    
    <main class="form-container" style="width: 100%; max-width: 500px; margin: 1rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="font-size: 2rem; display: block; margin-bottom: 1rem;">EstateLink Pro</a>
            <h1 style="font-size: 1.5rem; color: #333;">Create an Account</h1>
        </div>
        
        <form id="register-form">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required autocomplete="name">
            
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. +254 727 469119" required autocomplete="tel">
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password">
            
            <button type="submit" class="btn btn-call" style="width: 100%; padding: 1rem; margin-top: 1rem;">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: #666;">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in</a>
        </p>
    </main>

    <script src="js/app.js" defer></script>
</body>
</html>
