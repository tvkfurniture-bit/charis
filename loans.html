<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulate property loans and get financial assistance directly through EstateLink Pro.">
    <meta name="theme-color" content="#0056b3">
    <title>Financial Loans & Simulation | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <nav id="main-nav" aria-label="Main Navigation"></nav>

    <main class="container" style="padding: 2rem 5%;">
        <div class="form-container">
            <h1 style="font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem;">Loan Calculator & Application</h1>
            <p style="text-align: center; margin-bottom: 2rem; color: #666;">Estimate your monthly payments for property financing.</p>
            
            <form id="loan-form">
                <label for="amount">Property Value / Loan Amount (Ksh)</label>
                <input type="number" id="amount" name="amount" placeholder="e.g. 5000000" min="100000" required>
                
                <label for="interest">Estimated Interest Rate (%)</label>
                <input type="number" id="interest" value="12" disabled>
                
                <label for="years">Repayment Period (Years)</label>
                <select id="years" name="years">
                    <option value="5">5 Years</option>
                    <option value="10">10 Years</option>
                    <option value="15">15 Years</option>
                    <option value="20">20 Years</option>
                </select>
                
                <button type="submit" class="btn btn-call" style="width: 100%; margin-top: 1rem; padding: 1rem;">Simulate Loan</button>
            </form>
            
            <div id="loan-result" style="margin-top: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--secondary);" aria-live="polite"></div>
        </div>
    </main>
</body>
</html>
