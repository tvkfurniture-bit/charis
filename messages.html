<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Communicate with agents and buyers securely on EstateLink Pro.">
    <meta name="theme-color" content="#0056b3">
    <title>Messages | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <nav id="main-nav" aria-label="Main Navigation"></nav>

    <main class="container" style="padding: 2rem 5%;">
        <div style="max-width: 900px; margin: 0 auto; background: white; display: flex; height: 75vh; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);">
            
            <!-- Sidebar Contacts -->
            <aside style="width: 35%; border-right: 1px solid #eee; display: flex; flex-direction: column;">
                <div style="padding: 1.5rem; border-bottom: 1px solid #eee; background: var(--light);">
                    <h2 style="font-size: 1.2rem; margin: 0;">Inbox</h2>
                </div>
                <div style="flex: 1; overflow-y: auto;">
                    <div style="padding: 1.5rem; background: #f0f7ff; border-left: 4px solid var(--primary); cursor: pointer;">
                        <h4 style="margin: 0;">Agent John Doe</h4>
                        <p style="margin: 0; font-size: 0.85rem; color: #666; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">Regarding the Modern Luxury Villa...</p>
                    </div>
                </div>
            </aside>
            
            <!-- Chat Area -->
            <section style="width: 65%; display: flex; flex-direction: column;">
                <!-- Chat Header -->
                <div style="padding: 1.5rem; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between;">
                    <h3 style="margin: 0;">Agent John Doe</h3>
                    <a href="tel:0727469119" class="btn btn-call" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Call</a>
                </div>
                
                <!-- Chat History -->
                <div id="chat-box" style="flex: 1; padding: 1.5rem; overflow-y: auto; background: #fafbfc; display: flex; flex-direction: column; gap: 1rem;">
                    <div style="background: #e9ecef; color: var(--dark); padding: 1rem; border-radius: 12px 12px 12px 0; align-self: flex-start; max-width: 80%;">
                        Hello! Let me know if you'd like to schedule a viewing.
                    </div>
                    <div style="background: var(--primary); color: white; padding: 1rem; border-radius: 12px 12px 0 12px; align-self: flex-end; max-width: 80%;">
                        Hi John, yes I am available this Friday.
                    </div>
                </div>
                
                <!-- Chat Input -->
                <div style="padding: 1.5rem; border-top: 1px solid #eee; background: white;">
                    <form style="display: flex; gap: 10px; margin: 0;" onsubmit="event.preventDefault();">
                        <input type="text" placeholder="Type your message..." style="margin: 0; flex: 1; border-radius: 30px; padding: 0.8rem 1.5rem;" required>
                        <button type="submit" class="btn btn-call" style="border-radius: 30px; padding: 0 1.5rem;">Send</button>
                    </form>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
