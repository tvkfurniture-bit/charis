<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with the EstateLink Pro support team.">
    <meta name="theme-color" content="#0056b3">
    <title>Contact Us | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <nav id="main-nav" aria-label="Main Navigation"></nav>

    <main class="container" style="padding: 2rem 5%;">
        <div class="form-container">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Contact Support</h1>
            <p style="text-align: center; color: #666; margin-bottom: 2rem;">Questions about our services? We're here to help.</p>
            
            <form id="contact-form">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" style="width: 100%; padding: 1rem; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 1.5rem; font-family: inherit;" required></textarea>
                
                <button type="submit" class="btn btn-call" style="width: 100%; padding: 1rem;">Send Message</button>
            </form>
            
            <div style="margin-top: 3rem; text-align: center; padding-top: 2rem; border-top: 1px solid #eee;">
                <h3 style="margin-bottom: 1rem;">Direct Contact</h3>
                <p style="margin-bottom: 0.5rem;">📞 <strong>Hotline:</strong> <a href="tel:0727469119" style="color: var(--primary); text-decoration: none;">0727 469119</a></p>
                <p style="margin-bottom: 0.5rem;">💬 <strong>WhatsApp:</strong> <a href="https://wa.me/254727469119" style="color: var(--secondary); text-decoration: none;">Chat with us</a></p>
                <p>📧 <strong>Email:</strong> support@estatelinkpro.com</p>
            </div>
        </div>
    </main>
</body>
</html>
