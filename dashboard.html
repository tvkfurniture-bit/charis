<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your real estate listings, favorites, and profile.">
    <meta name="theme-color" content="#0056b3">
    <title>My Dashboard | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <nav id="main-nav" aria-label="Main Navigation"></nav>

    <main class="container" style="padding: 3rem 5%;">
        <h1 style="margin-bottom: 2rem;">Welcome Back, <span style="color: var(--primary);">User</span></h1>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
            <!-- Favorites Panel -->
            <section style="background: white; padding: 2rem; border-radius: 10px; box-shadow: var(--shadow);">
                <h2 style="margin-bottom: 1.5rem; font-size: 1.3rem;">❤️ Saved Properties</h2>
                <div id="favorites-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Rendered by JS -->
                    <p style="color: #666;">You haven't saved any properties yet.</p>
                </div>
            </section>
            
            <!-- Account Settings Panel -->
            <section style="background: white; padding: 2rem; border-radius: 10px; box-shadow: var(--shadow); height: fit-content;">
                <h2 style="margin-bottom: 1.5rem; font-size: 1.3rem;">⚙️ Account Settings</h2>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <button type="button" class="btn btn-call">Edit Profile</button>
                    <button type="button" class="btn btn-wa">My Active Listings</button>
                    <button type="button" class="btn" style="background: #ffebee; color: #d32f2f;">Sign Out</button>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
