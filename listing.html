<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View comprehensive details, images, and pricing for this premium property.">
    <meta name="theme-color" content="#0056b3">
    <title>Property Details | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <nav id="main-nav" aria-label="Main Navigation"></nav>

    <main class="container" style="padding: 3rem 5%;">
        <article id="details-container" style="display: flex; gap: 3rem; flex-wrap: wrap; background: white; padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);">
            <!-- Static structure for SEO/Hydration -->
            <div style="flex: 1; min-width: 300px;">
                <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=800" alt="Modern Luxury Villa" loading="lazy" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
            </div>
            
            <div style="flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center;">
                <span style="background: var(--light); padding: 5px 10px; border-radius: 5px; font-size: 0.9rem; width: fit-content; margin-bottom: 10px;">For Sale</span>
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Modern Luxury Villa</h1>
                <p style="font-size: 1.2rem; color: #555; margin-bottom: 1rem;">📍 Karen, Nairobi</p>
                <p class="price" style="font-size: 2.5rem; color: var(--secondary); margin-bottom: 1.5rem;">Ksh 15,000,000</p>
                
                <h3 style="margin-bottom: 0.5rem;">Description</h3>
                <p style="color: #666; margin-bottom: 2rem; line-height: 1.8;">Experience unparalleled luxury in this modern villa featuring state-of-the-art amenities, expansive outdoor spaces, and a secure neighborhood ideal for families and professionals alike.</p>
                
                <div class="actions" style="display: flex; gap: 1rem;">
                    <a href="tel:0727469119" class="btn btn-call" style="flex: 1; padding: 1rem;">📞 Call Agent</a>
                    <a href="https://wa.me/254727469119" target="_blank" rel="noopener noreferrer" class="btn btn-wa" style="flex: 1; padding: 1rem;">💬 WhatsApp</a>
                </div>
            </div>
        </article>
    </main>
</body>
</html>
