<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="List your property for sale, rent, or lease on EstateLink Pro.">
    <meta name="theme-color" content="#0056b3">
    <title>Post a Listing | EstateLink Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <nav id="main-nav" aria-label="Main Navigation"></nav>

    <main class="container" style="padding: 2rem 5%;">
        <div class="form-container">
            <h1 style="text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem;">List Your Property</h1>
            
            <form id="post-listing-form">
                <label for="title">Property Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. 3 Bedroom Apartment" required>
                
                <label for="type">Listing Type</label>
                <select id="type" name="type" required>
                    <option value="buy">For Sale</option>
                    <option value="rent">For Rent</option>
                    <option value="leasing">Land Leasing</option>
                    <option value="office">Office Space</option>
                </select>
                
                <label for="price">Price (Ksh)</label>
                <input type="text" id="price" name="price" placeholder="e.g. 45,000" required>
                
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="e.g. Westlands, Nairobi" required>
                
                <label for="img">Image URL</label>
                <input type="url" id="img" name="img" placeholder="https://example.com/image.jpg" required>
                
                <button type="submit" class="btn btn-call" style="width: 100%; margin-top: 1rem; padding: 1rem;">Submit Listing</button>
            </form>
        </div>
    </main>
</body>
</html>
